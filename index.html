<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛄️ 燐的代購系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>body { background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }</style>
</head>
<body class="min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto space-y-8">
        <div class="bg-white rounded-2xl shadow-sm p-6 text-center border border-slate-100">
            <h1 class="text-2xl font-bold text-slate-800 mb-2">🛍️ 訂單與團務查詢系統</h1>
            <div id="syncStatus" class="inline-block mt-2 px-3 py-1 rounded-full text-xs font-semibold bg-amber-100 text-amber-800 animate-pulse">🔄 雲端資料庫連線中...</div>
        </div>

        <div class="bg-white rounded-2xl shadow-md p-6 border border-slate-100 space-y-4">
            <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                <span class="w-1.5 h-5 bg-teal-500 rounded-full"></span> 🛒 代購下單購物車（買家專用）
            </h2>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 bg-slate-50 p-3 rounded-xl border border-slate-100">
                <div class="flex items-center gap-1.5">
                    <span class="text-xs font-bold text-slate-600 shrink-0">您的稱呼:</span>
                    <input type="text" id="cartBuyerName" placeholder="請輸入稱呼" class="w-full px-2.5 py-1 bg-white border border-slate-200 rounded-lg outline-none text-xs text-slate-700">
                </div>
                <div class="flex items-center gap-1.5">
                    <span class="text-xs font-bold text-slate-600 shrink-0">欲跟團名:</span>
                    <select id="cartGroupSelect" class="w-full px-2 py-1 bg-white border border-slate-200 rounded-lg outline-none text-xs text-slate-700">
                        <option value="">載入中...</option>
                    </select>
                </div>
                <div class="flex justify-end items-center">
                    <button onclick="addCartRow()" class="w-full sm:w-auto bg-teal-500 hover:bg-teal-600 text-white text-xs font-bold px-4 py-1.5 rounded-lg shadow-sm transition cursor-pointer text-center">➕ 新增品項</button>
                </div>
            </div>
            <div id="cartRowsContainer" class="space-y-3"></div>
            </div>
        </div>

    <script>
        // ... (省略部分變數宣告) ...
        const CART_CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`; 

        // 修改後的 fetch 邏輯
        async function fetchCartSheetPrices() {
            try {
                const csvData = await parseCloudCSV(CART_CSV_URL);
                cartSheetPrices = [];
                let groupOptions = [];

                if (csvData.length > 0) {
                    // 1. 抓取團名 (第 1 列: row 0)
                    const firstRow = csvData[0];
                    for (let col = 0; col < firstRow.length; col += 3) {
                        if (firstRow[col] && firstRow[col].trim() !== "") {
                            groupOptions.push(firstRow[col].trim());
                        }
                    }

                    // 2. 抓取商品 (第 3 列以後: row 2+)
                    for (let rowIdx = 2; rowIdx < csvData.length; rowIdx++) {
                        const row = csvData[rowIdx];
                        // 每隔 3 欄一組 (A,B), (D,E), (G,H)...
                        for (let col = 0; col < row.length; col += 3) {
                            const name = row[col] ? row[col].trim() : "";
                            const price = row[col + 1] ? parseInt(row[col + 1]) : 0;
                            
                            if (name !== "" && name !== "品名") {
                                cartSheetPrices.push({ name: name, price: price });
                            }
                        }
                    }
                }

                // 更新選單
                const groupSelect = document.getElementById('cartGroupSelect');
                groupSelect.innerHTML = groupOptions.map(g => `<option value="${g}">${g}</option>`).join('');
                
            } catch (err) { console.error("資料讀取失敗：", err); }
        }
        
        // ... (其餘初始化與邏輯保持原樣) ...
        initSystem();
    </script>
</body>
</html>
